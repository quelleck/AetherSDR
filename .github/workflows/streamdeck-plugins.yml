name: Stream Deck Plugins

# The Stream Deck integrations rarely change and are independent of the app
# version, so we publish them once to the stable `streamdeck-plugins` release
# instead of re-attaching identical copies to every `v*` tag. This refreshes
# that stable release only when the plugin sources actually change on main
# (or on manual dispatch).
on:
  push:
    branches: [main]
    paths:
      - 'plugins/elgato-aethersdr/**'
      - 'plugins/streamcontroller-aethersdr/**'
      - '.github/workflows/streamdeck-plugins.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-plugins:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Package Elgato plugin
        run: |
          cd plugins/elgato-aethersdr
          zip -r ../../com.aethersdr.radio.streamDeckPlugin com.aethersdr.radio.sdPlugin/

      - name: Package StreamController plugin
        run: |
          cd plugins
          zip -r ../streamcontroller-aethersdr.zip streamcontroller-aethersdr/ \
            -x "*/__pycache__/*"

      - name: Publish to the stable streamdeck-plugins release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=streamdeck-plugins
          # Create the stable release once if it's missing (idempotent).
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "Stream Deck Plugins (stable)" \
              --notes "Canonical, version-independent home for the AetherSDR Stream Deck integrations. Refreshed whenever plugins/ changes on main." \
              --prerelease
          fi
          gh release upload "$TAG" \
            com.aethersdr.radio.streamDeckPlugin \
            streamcontroller-aethersdr.zip \
            --clobber
